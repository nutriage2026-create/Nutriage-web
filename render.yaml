services:
  - type: web
    name: nutriage-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level debug
    envVars:
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DB_PACIENTES
        sync: false
      - key: NOTION_DB_LEADS
        sync: false
      - key: NOTION_DB_HISTORIAL_AGENTE
        sync: false
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_USERNAME
        sync: false
      - key: CALCOM_EVENT_TYPE_ID
        sync: false
      - key: MAKE_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: APP_ENV
        value: production
      - key: TZ
        value: America/Santiago

  - type: web
    name: nutriage-frontend
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /
        destination: /booking.html
